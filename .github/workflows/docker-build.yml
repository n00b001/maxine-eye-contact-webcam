name: Build and Push ARSDK Gaze Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/arsdk-gaze
  BASE_IMAGE: ghcr.io/${{ github.repository }}/arsdk-base:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify base image exists
        run: |
          if ! docker manifest inspect "${BASE_IMAGE}" > /dev/null 2>&1; then
            echo ""
            echo "❌ Base image not found: ${BASE_IMAGE}"
            echo ""
            echo "The NVIDIA ARSDK is proprietary and cannot be committed to this public repo."
            echo "You must build and push the base image once from a machine with ARSDK:"
            echo ""
            echo "  ./scripts/push-arsdk-base.sh latest"
            echo ""
            echo "See README.md → 'GitHub Actions CI / GHCR Publishing' for details."
            echo ""
            exit 1
          fi
          echo "✅ Base image found: ${BASE_IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag || 'latest' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ARSDK_BASE=${{ env.BASE_IMAGE }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
