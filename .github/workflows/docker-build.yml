name: Build and Push ARSDK Gaze Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/arsdk-gaze
  BASE_IMAGE: ghcr.io/${{ github.repository }}/arsdk-base:latest

jobs:
  lint-test:
    # Mirrors scripts/pre-commit and scripts/pre-push: ruff check,
    # ruff format check, and pytest. Coverage gate is off while the
    # unified-pipeline rewrite is in progress — runtime code lives in
    # the Docker image, not the host Python surface.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run ruff check (pre-commit parity)
        run: uv run ruff check .
      - name: Run ruff format --check (pre-commit parity)
        run: uv run ruff format --check .
      - name: Run pytest (pre-commit + pre-push parity)
        run: uv run pytest

  build-and-push:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Verify base image exists
        run: |
          echo "Checking base image: ${BASE_IMAGE}"
          if ! docker buildx imagetools inspect "${BASE_IMAGE}" > /dev/null 2>&1; then
            echo ""
            echo "Base image not found or not accessible: ${BASE_IMAGE}"
            echo ""
            echo "The NVIDIA ARSDK is proprietary and cannot be committed to this public repo."
            echo "You must build and push the base image once from a machine with ARSDK:"
            echo ""
            echo "  ./scripts/push-arsdk-base.sh latest"
            echo ""
            echo "If the image exists but is private, add a GHCR_PAT secret with 'read:packages' scope."
            echo "See README.md -> 'GitHub Actions CI / GHCR Publishing' for details."
            echo ""
            exit 1
          fi
          echo "Base image found: ${BASE_IMAGE}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag || 'latest' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ARSDK_BASE=${{ env.BASE_IMAGE }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
