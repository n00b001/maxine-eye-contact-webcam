version: "3.8"

services:
  maxine-ar-sdk-webcam:
    image: ghcr.io/n00b001/maxine-eye-contact-webcam/arsdk-gaze:latest
    container_name: maxine-ar-sdk-webcam
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    devices:
      - /dev/video0:/dev/video0
      - /dev/video10:/dev/video10
    volumes:
      # FLP ONNX models + TRT engines (downloaded once on host, built on first run)
      - /opt/flp-checkpoints:/opt/flp-checkpoints
      # User-supplied neutral frontal portrait (see setup.sh for instructions)
      - /opt/maxine-portrait.jpg:/app/src-portrait.jpg:ro
    # Default CMD is set in Dockerfile (Python orchestrator). Override example:
    # command: ["/usr/local/bin/maxine_ar_webcam", "/dev/video10", "640", "480"]
