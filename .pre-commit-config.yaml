repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest-cov
        name: pytest with coverage
        entry: uv run pytest --cov --cov-fail-under=80
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
