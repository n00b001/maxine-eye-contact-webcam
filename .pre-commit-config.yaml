repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        # Coverage gate off during the unified-pipeline rewrite —
        # runtime code lives in the Docker image, not on the host.
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
